  corridor_parking:
    frame_id: map
    pose:
      position: {x: 35.0, y: 35.0, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
    description: "过道停车点"

# ------------------------------------------------------------
# 行为树工作参数
# ------------------------------------------------------------
work_parameters:
  distance_thresholds:
    # ===== 抬臂相关 =====
    raise_arm_distance: 15.0       # 【与code=4(抬臂)相关】到达hopper前触发抬臂的距离阈值
    retract_arm_distance: 9.0      # 【与code=5(收臂)相关】返回park时触发收臂的距离阈值

    # ===== 下斗/放斗相关 =====
    lower_bucket_distance: 8.0     # 【与code=3(下斗)相关】到达scoop点前触发下斗的距离阈值

    # ===== 铲料相关 =====
    stop_scoop_distance: 3.0       # 【与code=7(铲料)相关】到达scoop点时触发铲料的距离阈值
    start_scoop_distance: 1.0      # 【预留】铲料启动距离阈值

    # ===== 卸料相关 =====
    dump_guard_distance: 4.0       # 【与code=6(卸料)相关】卸料守护距离
    start_dump_distance: 0.0      # 【预留】卸料启动距离

    # ===== 点云累积相关 =====
    hopper_leave_distance: 5.0      # 【与code=5(收臂)+点云累积相关】离开料仓时触发收臂+停止点云累积的距离
    stop_accumulation_distance: 5.0 # 【与点云累积相关】离开scoop点后触发停止点云累积的距离
    retreat_check_distance: 0.1   # 【与code=8(抖料)+点云累积相关】后退检测距离，用于判断是否开始后退

    # ===== 到达判定相关 =====
    arrival_dist_error_threshold: 0.5   # 到达距离误差阈值
    arrival_angle_error_threshold: 10.0  # 到达角度误差阈值（度）
  timeouts:
    navigation_timeout:   300.0
    work_device_timeout:  300.0
    scoop_timeout:        300.0
    accumulation_timeout: 120.0
  loop_parameters:
    max_task_retries:   3
    task_check_interval: 1.0


