# ------------------------------------------------------------
# 行为树工作参数
# ------------------------------------------------------------
work_parameters:
  distance_thresholds:
    raise_arm_distance:    15.0  # 抬臂距离
    lower_bucket_distance: 6.0  # 放斗距离
    dump_guard_distance:   4.0  # 卸料守护
    start_scoop_distance:  1.0  # 铲料启动
    start_dump_distance:   0.0  # 卸料启动
    arrival_dist_error_threshold: 0.5  # 到达距离误差阈值
    arrival_angle_error_threshold: 10.0 # 到达角度误差阈值（度）
    arrival_dist_error_threshold: 0.5  # 到达距离误差阈值
    arrival_angle_error_threshold: 10.0  # 到达角度误差阈值（度）
  timeouts:
    navigation_timeout:   300.0
    work_device_timeout:  300.0
    scoop_timeout:        300.0
    accumulation_timeout: 120.0
  loop_parameters:
    max_task_retries:   3
    task_check_interval: 1.0


